<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIC Assessment Tally</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; background: #f5f5f3; color: #222; padding: 16px; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #666; margin-bottom: 20px; }
  .query-row { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  input[type=text] { flex: 1; min-width: 140px; padding: 10px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; background: #fff; }
  button { padding: 10px 20px; background: #333; color: #fff; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
  button.secondary { background: #888; margin-left: 4px; }
  .section { background: #fff; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 16px; overflow: hidden; }
  .section-header { padding: 12px 16px; background: #f0f0ee; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
  .section-title { font-weight: 600; font-size: 14px; }
  .badge { font-size: 12px; font-weight: 600; background: #333; color: #fff; border-radius: 12px; padding: 2px 10px; }
  .badge.zero { background: #bbb; }
  .item { padding: 12px 16px; border-bottom: 1px solid #eee; }
  .item:last-child { border-bottom: none; }
  .item-main { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
  .item-detail { font-size: 13px; color: #555; }
  .item-note { font-size: 13px; color: #888; font-style: italic; margin-top: 2px; }
  .empty { padding: 16px; font-size: 13px; color: #999; text-align: center; }
  .error { padding: 12px 16px; background: #fff3f3; color: #c00; font-size: 13px; border-radius: 8px; margin-bottom: 16px; }
  .context-bar { font-size: 13px; color: #666; margin-bottom: 16px; padding: 10px 14px; background: #fff; border: 1px solid #ddd; border-radius: 6px; }
  .debug { margin-top: 20px; padding: 12px; background: #f8f8f8; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; font-family: monospace; white-space: pre-wrap; word-break: break-all; display: none; }
</style>
</head>
<body>

<h1>RIC Assessment Tally</h1>
<p class="subtitle">Materials and pre-existing damage entered for a room</p>

<div class="query-row">
  <input type="text" id="jobInput" placeholder="Job number e.g. RIC8181" />
  <input type="text" id="roomInput" placeholder="Room name e.g. Living Room" />
  <button onclick="loadTally()">Load</button>
  <button class="secondary" onclick="toggleDebug()">Debug</button>
</div>

<div id="contextBar" style="display:none" class="context-bar"></div>
<div id="error" style="display:none" class="error"></div>
<div id="results"></div>
<div id="debug" class="debug"></div>

<script>
const API_KEY = 'd1ccf0e64fd2b12f301db69ae9301a15';
const MAF_ID = '260938295996883';
const PAF_ID = '260938235927871';
let debugLog = [];

function log(msg) { debugLog.push(msg); document.getElementById('debug').textContent = debugLog.join('\n'); }
function toggleDebug() { const d = document.getElementById('debug'); d.style.display = d.style.display === 'none' ? 'block' : 'none'; }

const params = new URLSearchParams(window.location.search);
if (params.get('job')) document.getElementById('jobInput').value = params.get('job');
if (params.get('room')) document.getElementById('roomInput').value = params.get('room');
if (params.get('job') && params.get('room')) loadTally();

async function fetchSubs(formId, label) {
  const url = `https://api.jotform.com/form/${formId}/submissions?apiKey=${API_KEY}&limit=100&orderby=created_at`;
  log(`\nFetching ${label}: ${url}`);
  const r = await fetch(url);
  log(`${label} status: ${r.status}`);
  const d = await r.json();
  log(`${label} responseCode: ${d.responseCode}, count: ${(d.content||[]).length}`);
  if (d.content && d.content[0]) {
    const firstAnswers = d.content[0].answers || {};
    log(`${label} first sub fields: ${Object.values(firstAnswers).map(a => a.name + '=' + JSON.stringify(a.answer)).join(' | ')}`);
  }
  return d.content || [];
}

function getField(answers, name) {
  const f = Object.values(answers).find(a => a.name === name);
  return f ? (f.answer || '') : '';
}

function renderMAF(items) {
  if (!items.length) return '<div class="empty">No damaged materials recorded</div>';
  return items.map(s => {
    const a = s.answers;
    const mat = getField(a, 'material_name');
    const dmg = getField(a, 'material_damage_type');
    const sal = getField(a, 'material_salvageability');
    const note = getField(a, 'material_comments');
    return `<div class="item">
      <div class="item-main">${mat}</div>
      <div class="item-detail">${dmg}${sal ? ' &mdash; ' + sal : ''}</div>
      ${note ? `<div class="item-note">${note}</div>` : ''}
    </div>`;
  }).join('');
}

function renderPAF(items) {
  if (!items.length) return '<div class="empty">No pre-existing damage recorded</div>';
  return items.map(s => {
    const a = s.answers;
    const mat = getField(a, 'preexisting_material_name');
    const dmg = getField(a, 'preexisting_damage_type');
    const note = getField(a, 'preexisting_notes');
    return `<div class="item">
      <div class="item-main">${mat}</div>
      <div class="item-detail">${dmg}</div>
      ${note ? `<div class="item-note">${note}</div>` : ''}
    </div>`;
  }).join('');
}

async function loadTally() {
  const job = document.getElementById('jobInput').value.trim();
  const room = document.getElementById('roomInput').value.trim();
  const errEl = document.getElementById('error');
  const resEl = document.getElementById('results');
  const ctxEl = document.getElementById('contextBar');

  debugLog = [];
  errEl.style.display = 'none';
  if (!job || !room) { errEl.textContent = 'Enter both a job number and room name.'; errEl.style.display = 'block'; return; }

  log(`Query: job="${job}" room="${room}"`);
  resEl.innerHTML = '<div style="padding:16px;color:#666;font-size:13px;">Loading&hellip;</div>';
  ctxEl.style.display = 'none';

  try {
    const [mafSubs, pafSubs] = await Promise.all([fetchSubs(MAF_ID, 'MAF'), fetchSubs(PAF_ID, 'PAF')]);

    const maf = mafSubs.filter(s => {
      const j = getField(s.answers, 'job_ric_number');
      const r = getField(s.answers, 'room_name');
      log(`MAF sub: job="${j}" room="${r}" match=${j===job && r===room}`);
      return j === job && r === room;
    });
    const paf = pafSubs.filter(s => {
      const j = getField(s.answers, 'job_ric_number');
      const r = getField(s.answers, 'room_name');
      log(`PAF sub: job="${j}" room="${r}" match=${j===job && r===room}`);
      return j === job && r === room;
    });

    log(`\nMatched: MAF=${maf.length} PAF=${paf.length}`);
    document.getElementById('debug').textContent = debugLog.join('\n');

    ctxEl.innerHTML = `<strong>${job}</strong> &mdash; ${room}`;
    ctxEl.style.display = 'block';

    resEl.innerHTML = `
      <div class="section">
        <div class="section-header">
          <span class="section-title">Damaged materials</span>
          <span class="badge ${maf.length === 0 ? 'zero' : ''}">${maf.length}</span>
        </div>
        ${renderMAF(maf)}
      </div>
      <div class="section">
        <div class="section-header">
          <span class="section-title">Pre-existing damage</span>
          <span class="badge ${paf.length === 0 ? 'zero' : ''}">${paf.length}</span>
        </div>
        ${renderPAF(paf)}
      </div>`;
  } catch(e) {
    log(`ERROR: ${e.message}`);
    document.getElementById('debug').textContent = debugLog.join('\n');
    resEl.innerHTML = '';
    errEl.textContent = 'Could not load data: ' + e.message;
    errEl.style.display = 'block';
  }
}
</script>
</body>
</html>
